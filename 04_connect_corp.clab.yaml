name: 04_connect_corp

topology:
  nodes:
    # AS 1 Topology
    as1_h1:
      kind: linux
      image: alpine
      exec:
        - ip addr add 201.0.0.2/30 dev eth1
        - ip route del 0.0.0.0/0
        - ip route add 0.0.0.0/0 via 201.0.0.1
        - ip -6 addr add 2000:1111:1:fffe::1000/64 dev eth1
        - ip -6 route del ::/0
        - ip -6 route add ::/0 via 2000:1111:1:fffe::1
    as1_h2:
      kind: linux
      image: alpine
      exec:
        - ip addr add 201.0.1.10/24 dev eth1
        - ip route del 0.0.0.0/0
        - ip route add 0.0.0.0/0 via 201.0.1.1
        - ip -6 addr add 2000:1111:1:ffff::1000/64 dev eth1
        - ip -6 route del ::/0
        - ip -6 route add ::/0 via 2000:1111:1:ffff::1
    as1_r1:
      kind: linux
      image: quay.io/frrouting/frr:10.4.1
      binds:
        - ./config/as1_r1:/etc/frr:rw
      exec:
        - sysctl net.ipv6.conf.all.forwarding=1
        - ip route del 0.0.0.0/0
        - ip -6 route del ::/0
