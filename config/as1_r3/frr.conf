frr version 10.4.1_git
frr defaults traditional
hostname as1_r3
!
route-map peers_out permit 10
 match ip address prefix-list AS1_networks
 set community 1:100 additive
 set metric 10
exit
!
route-map peers_out permit 20
 match ip address prefix-list AS1_transit_networks
exit
!
route-map peers_out deny 999
exit
!
route-map peers_in permit 10
exit
!
ip route 101.1.0.0/16 blackhole 254
ip route 201.0.0.0/15 blackhole 254
ip route 101.0.0.0/24 blackhole 254
ipv6 route 2000:1111::/32 blackhole 254
!
interface eth1
 description connection to AS1-R1
 ip address 101.1.1.6/30
 ip ospf area 0
 ipv6 address 2000:1111:1:103::2/64
 ipv6 ospf6 area 0
exit
!
interface eth2
 description connection to AS1-R2
 ip address 101.1.1.10/30
 ip ospf area 0
 ipv6 address 2000:1111:1:203::2/64
 ipv6 ospf6 area 0
exit
!
interface eth3
 description connection to AS1-R4
 ip address 101.1.1.13/30
 ip ospf area 0
 ipv6 address 2000:1111:1:304::1/64
 ipv6 ospf6 area 0
exit
!
interface eth4
 description connection to AS1-R5
 ip address 101.1.1.17/30
 ip ospf area 0
 ipv6 address 2000:1111:1:305::1/64
 ipv6 ospf6 area 0
exit
!
interface lo
 description AS1 R3 Loopback
 ip address 101.0.0.3/32
 ip ospf area 0
 ip ospf passive
 ipv6 address 2000:1111:1::3/128
 ipv6 ospf6 area 0
 ipv6 ospf6 passive
exit
!
router bgp 1
 bgp router-id 101.0.0.3
 bgp log-neighbor-changes
 neighbor ibgp peer-group
 neighbor ibgp remote-as 1
 neighbor ibgp update-source lo
 neighbor 101.0.0.1 peer-group ibgp
 neighbor 101.0.0.1 description R1
 neighbor 101.0.0.2 peer-group ibgp
 neighbor 101.0.0.2 description R2
 !
 address-family ipv4 unicast
  network 101.0.0.0/24
  network 101.1.0.0/16
  network 201.0.0.0/15
  neighbor ibgp next-hop-self
 exit-address-family
 !
 address-family ipv6 unicast
  network 2000:1111::/32
  neighbor ibgp activate
  neighbor ibgp next-hop-self
 exit-address-family
exit
!
router ospf
 ospf router-id 101.0.0.3
 redistribute connected metric-type 1
 default-information originate always
exit
!
router ospf6
 ospf6 router-id 101.0.0.3
 redistribute connected metric-type 1
 default-information originate always
exit
!
