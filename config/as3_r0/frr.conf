frr version 10.4.1_git
frr defaults traditional
hostname as3_r0
!
ip prefix-list AS3_networks description My AS3 Networks
ip prefix-list AS3_networks seq 5 permit 103.0.0.0/24
ip prefix-list AS3_networks seq 10 permit 103.1.0.0/16 le 24
ip prefix-list AS3_networks seq 15 permit 203.0.0.0/15 le 24
ip prefix-list AS3_transit_networks description Networks for Transit
!
ipv6 prefix-list AS3_networks_v6 description My AS3 IPv6 Networks
ipv6 prefix-list AS3_networks_v6 seq 5 permit 2000:3333::/32
!
route-map peers_out permit 10
 match ip address prefix-list AS3_networks
 set community 1:100 additive
 set metric 10
exit
!
route-map peers_out permit 15
 match ipv6 address prefix-list AS3_networks_v6
 set community 2:100 additive
 set metric 10
exit
!
route-map peers_out permit 20
 match as-path transit_as
exit
!
route-map peers_out deny 999
exit
!
route-map peers_in permit 10
exit
!
ip route 103.1.0.0/16 blackhole 254
ip route 203.0.0.0/15 blackhole 254
ip route 103.0.0.0/24 blackhole 254
ipv6 route 2000:3333::/32 blackhole 254
!
interface eth1
 description connection to AS3-H1
 ip address 203.0.0.1/30
 ip ospf area 0
 ip ospf passive
 ipv6 address 2000:3333:3:ffff::1/64
 ipv6 ospf6 area 0
 ipv6 ospf6 passive
exit
!
interface eth2
 description connection to AS1
 ip address 101.1.0.6/30
exit
!
interface eth3
 description connection to AS2
 ip address 102.1.0.2/30
exit
!
interface eth4
 description connection to AS2
 ip address 102.1.0.6/30
exit
!
interface eth5
 description connection to AS4
 ip address 103.1.0.1/30
exit
!
interface eth6
 description connection to AS7
 ip address 103.1.0.5/30
exit
!
interface lo
 description AS3 R0 Loopback
 ip address 103.0.0.0/32
 ip ospf area 0
 ip ospf passive
 ipv6 address 2000:3333:3::/128
 ipv6 ospf6 area 0
 ipv6 ospf6 passive
exit
!
router bgp 3
 bgp router-id 103.0.0.0
 bgp log-neighbor-changes
 neighbor 101.1.0.5 remote-as 1
 neighbor 101.1.0.5 description AS1
 neighbor 102.1.0.1 remote-as 2
 neighbor 102.1.0.1 description AS2
 neighbor 102.1.0.5 remote-as 2
 neighbor 102.1.0.5 description AS2
 neighbor 103.1.0.2 remote-as 4
 neighbor 103.1.0.2 description AS4
 neighbor 103.1.0.6 remote-as 7
 neighbor 103.1.0.6 description AS7
 !
 address-family ipv4 unicast
  network 103.0.0.0/24
  network 103.1.0.0/16
  network 203.0.0.0/15
  neighbor 101.1.0.5 next-hop-self
  neighbor 101.1.0.5 route-map peers_in in
  neighbor 101.1.0.5 route-map peers_out out
  neighbor 102.1.0.1 next-hop-self
  neighbor 102.1.0.1 route-map peers_in in
  neighbor 102.1.0.1 route-map peers_out out
  neighbor 102.1.0.5 next-hop-self
  neighbor 102.1.0.5 route-map peers_in in
  neighbor 102.1.0.5 route-map peers_out out
  neighbor 103.1.0.2 next-hop-self
  neighbor 103.1.0.2 route-map peers_in in
  neighbor 103.1.0.2 route-map peers_out out
  neighbor 103.1.0.6 next-hop-self
  neighbor 103.1.0.6 route-map peers_in in
  neighbor 103.1.0.6 route-map peers_out out
 exit-address-family
 !
 address-family ipv6 unicast
  network 2000:3333::/32
  neighbor 101.1.0.5 activate
  neighbor 101.1.0.5 next-hop-self
  neighbor 101.1.0.5 route-map peers_in in
  neighbor 101.1.0.5 route-map peers_out out
  neighbor 102.1.0.1 activate
  neighbor 102.1.0.1 next-hop-self
  neighbor 102.1.0.1 route-map peers_in in
  neighbor 102.1.0.1 route-map peers_out out
  neighbor 102.1.0.5 activate
  neighbor 102.1.0.5 next-hop-self
  neighbor 102.1.0.5 route-map peers_in in
  neighbor 102.1.0.5 route-map peers_out out
  neighbor 103.1.0.2 activate
  neighbor 103.1.0.2 next-hop-self
  neighbor 103.1.0.2 route-map peers_in in
  neighbor 103.1.0.2 route-map peers_out out
  neighbor 103.1.0.6 activate
  neighbor 103.1.0.6 next-hop-self
  neighbor 103.1.0.6 route-map peers_in in
  neighbor 103.1.0.6 route-map peers_out out
 exit-address-family
exit
!
router ospf
 ospf router-id 103.0.0.0
 redistribute connected metric-type 1
exit
!
router ospf6
 ospf6 router-id 103.0.0.0
 redistribute connected metric-type 1
exit
!
bgp as-path access-list transit_as seq 5 permit ^7_
bgp as-path access-list transit_as seq 10 permit ^4_
bgp as-path access-list transit_as seq 15 permit ^2_
!
