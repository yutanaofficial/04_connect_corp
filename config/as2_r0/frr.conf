frr version 10.4.1_git
frr defaults traditional
hostname as2_r0
!
ip prefix-list AS2_transit_networks description Networks for Transit
ip prefix-list AS2_networks description My AS2 Networks
ip prefix-list AS2_networks seq 5 permit 102.0.0.0/24
ip prefix-list AS2_networks seq 10 permit 102.1.0.0/16 le 24
ip prefix-list AS2_networks seq 15 permit 202.0.0.0/15 le 24
!
ipv6 prefix-list AS2_networks_v6 description My AS2 IPv6 Networks
ipv6 prefix-list AS2_networks_v6 seq 5 permit 2000:2222::/32
!
route-map peers_out permit 10
 match ip address prefix-list AS2_networks
 set community 2:100 additive
 set metric 10
exit
!
route-map peers_out permit 15
 match ipv6 address prefix-list AS2_networks_v6
 set community 2:100 additive
 set metric 10
exit
!
route-map peers_out permit 20
 match as-path transit_as
exit
!
route-map peers_out deny 999
exit
!
route-map peers_in permit 10
exit
!
ip route 102.1.0.0/16 blackhole 254
ip route 202.0.0.0/15 blackhole 254
ip route 102.0.0.0/24 blackhole 254
ipv6 route 2000:2222::/32 blackhole 254
!
interface eth1
 description connection to AS2-H1
 ip address 202.0.0.1/30
 ip ospf area 0
 ip ospf passive
 ipv6 address 2000:2222:2:ffff::1/64
 ipv6 ospf6 area 0
 ipv6 ospf6 passive
exit
!
interface eth2
 description connection to AS1
 ip address 101.1.0.2/30
exit
!
interface eth3
 description connection to AS3
 ip address 102.1.0.1/30
exit
!
interface eth4
 description connection to AS3
 ip address 102.1.0.5/30
exit
!
interface eth5
 description connection to AS4
 ip address 102.1.0.9/30
exit
!
interface eth6
 description connection to AS4
 ip address 102.1.0.13/30
exit
!
interface eth7
 description connection to AS5
 ip address 102.1.0.17/30
exit
!
interface lo
 description AS2 R0 Loopback
 ip address 102.0.0.0/32
 ip ospf area 0
 ip ospf passive
 ipv6 address 2000:2222:2::/128
 ipv6 ospf6 area 0
 ipv6 ospf6 passive
exit
!
router bgp 2
 bgp router-id 102.0.0.0
 bgp log-neighbor-changes
 neighbor 101.1.0.1 remote-as 1
 neighbor 101.1.0.1 description AS1
 neighbor 102.1.0.2 remote-as 3
 neighbor 102.1.0.2 description AS3
 neighbor 102.1.0.6 remote-as 3
 neighbor 102.1.0.6 description AS3
 neighbor 102.1.0.10 remote-as 4
 neighbor 102.1.0.10 description AS4
 neighbor 102.1.0.14 remote-as 4
 neighbor 102.1.0.14 description AS4
 neighbor 102.1.0.18 remote-as 5
 neighbor 102.1.0.18 description AS5
 !
 address-family ipv4 unicast
  network 102.0.0.0/24
  network 102.1.0.0/16
  network 202.0.0.0/15
  neighbor 101.1.0.1 next-hop-self
  neighbor 101.1.0.1 route-map peers_in in
  neighbor 101.1.0.1 route-map peers_out out
  neighbor 102.1.0.2 next-hop-self
  neighbor 102.1.0.2 route-map peers_in in
  neighbor 102.1.0.2 route-map peers_out out
  neighbor 102.1.0.6 next-hop-self
  neighbor 102.1.0.6 route-map peers_in in
  neighbor 102.1.0.6 route-map peers_out out
  neighbor 102.1.0.10 next-hop-self
  neighbor 102.1.0.10 route-map peers_in in
  neighbor 102.1.0.10 route-map peers_out out
  neighbor 102.1.0.14 next-hop-self
  neighbor 102.1.0.14 route-map peers_in in
  neighbor 102.1.0.14 route-map peers_out out
  neighbor 102.1.0.18 next-hop-self
  neighbor 102.1.0.18 route-map peers_in in
  neighbor 102.1.0.18 route-map peers_out out
 exit-address-family
 !
 address-family ipv6 unicast
  network 2000:2222::/32
  neighbor 101.1.0.1 activate
  neighbor 101.1.0.1 next-hop-self
  neighbor 101.1.0.1 route-map peers_in in
  neighbor 101.1.0.1 route-map peers_out out
  neighbor 102.1.0.2 activate
  neighbor 102.1.0.2 next-hop-self
  neighbor 102.1.0.2 route-map peers_in in
  neighbor 102.1.0.2 route-map peers_out out
  neighbor 102.1.0.6 activate
  neighbor 102.1.0.6 next-hop-self
  neighbor 102.1.0.6 route-map peers_in in
  neighbor 102.1.0.6 route-map peers_out out
  neighbor 102.1.0.10 activate
  neighbor 102.1.0.10 next-hop-self
  neighbor 102.1.0.10 route-map peers_in in
  neighbor 102.1.0.10 route-map peers_out out
  neighbor 102.1.0.14 activate
  neighbor 102.1.0.14 next-hop-self
  neighbor 102.1.0.14 route-map peers_in in
  neighbor 102.1.0.14 route-map peers_out out
  neighbor 102.1.0.18 activate
  neighbor 102.1.0.18 next-hop-self
  neighbor 102.1.0.18 route-map peers_in in
  neighbor 102.1.0.18 route-map peers_out out
 exit-address-family
exit
!
router ospf
 ospf router-id 102.0.0.0
 redistribute connected metric-type 1
exit
!
router ospf6
 ospf6 router-id 102.0.0.0
 redistribute connected metric-type 1
exit
!
bgp as-path access-list transit_as seq 5 permit ^4_
bgp as-path access-list transit_as seq 10 permit ^1_
bgp as-path access-list transit_as seq 15 permit ^3_
bgp as-path access-list transit_as seq 20 permit ^5_
!
